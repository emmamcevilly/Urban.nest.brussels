name: Optimize Images (WebP compressed)

on:
  push:

jobs:
  compress-images:
    # Skip auto commits
    if: "!contains(toLower(github.event.head_commit.message), 'auto')"

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp imagemagick

      - name: Convert all images to *_compressed.webp
        run: |
          find Pictures -type f \( \
            -iname "*.jpg" -o \
            -iname "*.jpeg" -o \
            -iname "*.png" -o \
            -iname "*.webp" -o \
            -iname "*.avif" \
          \) | while read file; do

            base="${file%.*}"
            output="${base}_compressed.webp"

            # Skip if already compressed version
            if [[ "$file" == *"_compressed.webp" ]]; then
              continue
            fi

            # Skip if already exists
            if [ -f "$output" ]; then
              echo "Skipping $file (already processed)"
              continue
            fi

            echo "Processing $file → $output"

            # Use ImageMagick for universal decoding + resize
            convert "$file" -resize '1400x800>' -quality 85 "$output"
          done

      - name: Update HTML & CSS references
        run: |
          find . -type f \( -name "*.html" -o -name "*.css" \) | while read file; do
            
            # Replace all supported formats with _compressed.webp
            sed -i -E 's/\.(jpg|jpeg|png|webp|avif)/_compressed.webp/gI' "$file"
          
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "Auto optimize images (_compressed.webp)"
          git push
